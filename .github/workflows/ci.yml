name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: ${{ matrix.os }} / Python 3.12 / Node.js 22
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      CI: "true"
      PYTHONUTF8: "1"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install audio runtime (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes ffmpeg libsndfile1

      - name: Install audio runtime (macOS)
        if: runner.os == 'macOS'
        run: command -v ffmpeg >/dev/null 2>&1 || brew install ffmpeg

      - name: Install audio runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command ffmpeg -ErrorAction SilentlyContinue)) {
            choco install ffmpeg --yes --no-progress
          }

      - name: Install project
        run: python scripts/beatforge.py install

      - name: Test
        run: python scripts/beatforge.py test

      - name: Lint
        run: python scripts/beatforge.py lint

      - name: Build
        run: python scripts/beatforge.py build
