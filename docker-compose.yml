services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      BEATFORGE_DATABASE_URL: sqlite:////app/storage/beatforge.db
      BEATFORGE_STORAGE_DIR: /app/storage
      BEATFORGE_ALLOWED_ORIGINS: http://localhost:5173
    volumes:
      - ./storage:/app/storage
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:5173:80"
